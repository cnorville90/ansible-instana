---
- name: Playbook to create a bastion host in AWS for an Instana Sensor
  hosts: localhost 
  vars_files:
    - vars.yml

  tasks: 

    - name: Looking up Subnet_id
      register: subnet_id
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ vm_region }}"
        filters:
          tag:Name: "{{ vm_subnet_name }}"

    - name: Setting vpc_subnet_id based on Lookup
      when: vpc_subnet_id is undefined
      ansible.builtin.set_fact:
        vpc_subnet_id: "{{ subnet_id.subnets[0].id }}"

    - name: Grab my public ssh key from remote url
      ansible.builtin.get_url:
        url: '{{ my_remote_ssh_pub_key }}'
        dest: files/id_rsa_apd.pub
        mode: '0644'

    - name: create key pair using key_material obtained using file lookup plugin
      amazon.aws.ec2_key: 
        name: "{{ vm_my_ssh_key }}"
        region: "{{ vm_region }}"
        key_material: "{{ lookup('file', 'files/id_rsa_apd.pub') }}"

    - name: Spin up the Bastion Host
      register: instana_bastion
      amazon.aws.ec2_instance:
        name: "Instana Bastion"
        region: "{{ vm_region }}"
        state: running
        key_name: "{{ vm_my_ssh_key }}"
        vpc_subnet_id: "{{ vpc_subnet_id }}"
        instance_type: "{{ vm_bastion_instance_type }}"
        exact_count: "{{ vm_bastion_count }}"
        security_group: "{{ vm_ec2_security_group_name }}"
        network:
          assign_public_ip: "{{ vm_assign_public_ip }}"
        image_id: "{{ vm_image_bastion }}"
        tags:
          Environment: "{{ vm_vpc_name }}"
          AlwaysUp: "{{ vm_alwaysup }}"
          Createdby: Ansible Controller
          Contact: "{{ vm_my_email_address }}"
          DeletebBy: "{{ vm_ec2_ansible_group }}"
          group: instana
        wait: true
        wait_timeout: 600

    - name: Ensure we have an elastic ip for each controller
      register: ec2_eips_instana_bastion
      loop: "{{ instana_bastion['instances'] }}"
      amazon.aws.ec2_eip:
        device_id: "{{ item['instance_id'] }}"
        region: "{{ vm_region }}"
        tag_name: reserved_for
        tag_value: "{{ item['instance_id'] }}"
        release_on_disassociation: true
        tags:
          Environment: "{{ vm_vpc_name }}"
          AlwaysUp: "{{ vm_alwaysup }}"
          Createdby: Ansible Controller
          Contact: "{{ vm_my_email_address }}"
          DeletebBy: "{{ vm_ec2_ansible_group }}"

    - name: Wait 300 seconds for port 22 to become open and contain "OpenSSH"
      loop: "{{ ec2_eips_instana_bastion['results'] }}"
      ansible.builtin.wait_for:
        port: 22
        host: "{{ item['public_ip'] }}"
        search_regex: OpenSSH
        delay: 10

    - name: Wait for things to come up
      ansible.builtin.pause:
        seconds: 60

    - name: Get Demo instances we care about
      register: instance_info
      amazon.aws.ec2_instance_info:
        region: "{{ vm_region }}"
        filters:
          tag:Name: "Instana Bastion"
          instance-state-name: [running]

    - name: Debug
      ansible.builtin.debug:
        var: instance_info